# SPDX-License-Identifier: Apache-2.0
#
# License + dependency-ban gate for the db.md Rust toolkit.
#
# Enforces THIRD_PARTY_NOTICES' policy as a build gate so the NOTICES file
# and the shipped dependency tree can no longer silently drift:
#   * licenses — every crate's SPDX expression must be satisfiable by the
#     permissive allow-list in deny.toml (no GPL/AGPL/LGPL-static).
#   * bans     — the zero-AI/LLM and no-embeddings/vectors/ANN hard rules,
#     plus "no bundled ripgrep binary" (ripgrep is embedded via grep+ignore).
#
# Mirrors the local command exactly:  cargo deny check licenses bans

name: licenses

on:
  push:
    branches: [main]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'
      - 'deny.toml'
      - '.github/workflows/licenses.yml'
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'
      - 'deny.toml'
      - '.github/workflows/licenses.yml'

permissions:
  contents: read

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: cargo-deny (licenses + bans)
        uses: EmbarkStudios/cargo-deny-action@b66acf5e9fe20f8aba065be86778a8a4c846f902
        with:
          command: check licenses bans
