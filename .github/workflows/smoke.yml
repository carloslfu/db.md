# SPDX-License-Identifier: Apache-2.0
#
# Release smoke tests (plan: db-md-rust-toolkit.md, Block 8 § Smoke tests).
#
# Two checks, both end-to-end against real release artifacts:
#
#   1. install-script smoke (per platform) — serves the just-built
#      release/<version>/ tree over a local HTTP server, points the installer's
#      $DBMD_BASE_URL at it, and runs the real scripts/install.sh exactly as a
#      user would (`curl ... | sh`). Verifies platform detection, SHA256
#      verification, install to ~/.dbmd/bin, and a working binary:
#        dbmd --version
#        dbmd spec | head -20
#        dbmd validate tests/corpora/corpus-a-canonical/   (guarded)
#
# Why a local HTTP server: it makes the smoke test hermetic and immediate — it
# exercises the exact install.sh logic and the exact tarballs the release just
# produced, with zero dependence on external propagation.
#
# CI-GATED: the macOS + aarch64 legs run only on GitHub-hosted runners; they are
# authored + self-linted here, not executed on the dev host. The
# linux-aarch64-musl binary cannot execute on the x86_64 runner, so its leg
# verifies tarball integrity (download + checksum + unpack + arch check) without
# running the binary — honest about the single-host cross-exec limit.

name: smoke

on:
  # Run automatically after a successful release build.
  workflow_run:
    workflows: ["release"]
    types: [completed]
  # Or run by hand against a chosen version.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to smoke-test (without leading v). Defaults to release/latest.txt in the artifact.'
        required: false
        type: string

permissions:
  contents: read
  actions: read   # download artifacts from the triggering release run

env:
  BIN_NAME: dbmd

jobs:
  # ── Pull the mirror payload the release job produced ─────────────────────
  fetch-artifacts:
    # Only proceed if the release run actually succeeded (workflow_run fires on
    # failure too).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      # Assemble the local mirror tree from the GitHub Release assets for the
      # requested (or latest) version. On a workflow_run trigger the version is
      # the release that just completed; on manual dispatch it is inputs.version
      # (or the latest release). install.sh fetches from this local tree in the
      # matrix jobs, so the smoke test stays hermetic.
      - name: Assemble mirror from GitHub Release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ver="${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}"
          if [ -z "$ver" ]; then
            ver="$(gh release view --json tagName -q .tagName | sed 's/^v//')"
          fi
          # install.sh fetches from "$DBMD_BASE_URL/v$version/…" (the real
          # GitHub Releases layout), so the mirror tree must carry the v.
          mkdir -p "mirror/v${ver}"
          gh release download "v${ver}" --dir "mirror/v${ver}" --pattern 'dbmd-*.tar.gz' --pattern 'SHA256SUMS'
          cp scripts/install.sh "mirror/v${ver}/install.sh"
          printf '%s\n' "$ver" > mirror/latest.txt

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          ver="$(tr -d '[:space:]' < mirror/latest.txt)"
          test -n "$ver" || { echo "::error::empty mirror/latest.txt" >&2; exit 1; }
          test -d "mirror/v${ver}" || { echo "::error::mirror/v${ver} missing" >&2; exit 1; }
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Smoke-testing version: $ver"
          ls -la "mirror/v${ver}"

      - name: Re-upload mirror for the matrix jobs
        uses: actions/upload-artifact@v7
        with:
          name: smoke-mirror
          path: mirror/
          if-no-files-found: error
          retention-days: 1

  # ── install-script smoke on each host-runnable platform ──────────────────
  install-smoke:
    needs: fetch-artifacts
    name: install-smoke (${{ matrix.target_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: darwin-x86_64
            os: macos-15-intel
            runnable: true
          - target_name: darwin-aarch64
            os: macos-14
            runnable: true
          - target_name: linux-x86_64-musl
            os: ubuntu-latest
            runnable: true
          # aarch64-musl can't execute on the x86_64 ubuntu runner: integrity
          # check only (no binary execution). Honest about the cross-exec limit.
          - target_name: linux-aarch64-musl
            os: ubuntu-latest
            runnable: false
    steps:
      - uses: actions/checkout@v5

      - name: Download smoke mirror
        uses: actions/download-artifact@v7
        with:
          name: smoke-mirror
          path: mirror

      # Serve the mirror tree over localhost so install.sh fetches exactly the
      # artifacts the release produced. Python3 ships on all GitHub runners.
      - name: Serve mirror over HTTP
        shell: bash
        run: |
          set -euo pipefail
          cd mirror
          # Background HTTP server on 8099, bound to localhost.
          nohup python3 -m http.server 8099 --bind 127.0.0.1 >/tmp/httpd.log 2>&1 &
          echo $! > /tmp/httpd.pid
          # Wait for it to answer.
          for _ in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:8099/latest.txt" >/dev/null 2>&1; then
              echo "mirror server up"; break
            fi
            sleep 0.5
          done
          curl -fsS "http://127.0.0.1:8099/latest.txt"

      # The real install.sh, exactly as `curl ... | sh` would run it, but with
      # the base URL pointed at the local mirror and a clean install dir.
      - name: Run installer (runnable targets)
        if: ${{ matrix.runnable }}
        shell: bash
        env:
          DBMD_BASE_URL: http://127.0.0.1:8099
          DBMD_INSTALL_DIR: ${{ runner.temp }}/dbmd-bin
          DBMD_VERSION: ${{ needs.fetch-artifacts.outputs.version }}
        run: |
          set -euo pipefail
          # Pipe the script through sh, just like the documented one-liner.
          cat scripts/install.sh | sh
          echo "$DBMD_INSTALL_DIR" >> "$GITHUB_PATH"

      - name: Smoke — dbmd --version / spec / validate (runnable targets)
        if: ${{ matrix.runnable }}
        shell: bash
        env:
          DBMD: ${{ runner.temp }}/dbmd-bin/dbmd
        run: |
          set -euo pipefail
          version="${{ needs.fetch-artifacts.outputs.version }}"

          echo "::group::dbmd --version"
          out="$("$DBMD" --version)"
          echo "$out"
          echo "$out" | grep -q "dbmd ${version}" || {
            echo "::error::--version '$out' != dbmd ${version}" >&2; exit 1; }
          echo "::endgroup::"

          echo "::group::dbmd spec | head -20"
          "$DBMD" spec | head -20
          # spec must be non-empty.
          test -n "$("$DBMD" spec | head -1)" || { echo "::error::empty spec" >&2; exit 1; }
          echo "::endgroup::"

          echo "::group::dbmd validate tests/corpora/corpus-a-canonical/"
          if [ -e tests/corpora/corpus-a-canonical/DB.md ]; then
            "$DBMD" validate tests/corpora/corpus-a-canonical/
          else
            echo "corpus-a not present in this checkout; running 'dbmd validate' on a generated clean store instead"
            scratch="$(mktemp -d)"
            "$DBMD" init "$scratch" 2>/dev/null || true
            # init may not exist; fall back to a hand-made minimal store.
            if [ ! -e "$scratch/DB.md" ]; then
              printf -- '---\ntype: db\ncreated: 2026-01-01T00:00:00Z\nupdated: 2026-01-01T00:00:00Z\n---\n# Store\n' > "$scratch/DB.md"
              mkdir -p "$scratch/sources" "$scratch/records" "$scratch/wiki"
            fi
            "$DBMD" validate "$scratch" || {
              echo "::warning::validate on generated store returned non-zero (expected only if init is unavailable)"; }
          fi
          echo "::endgroup::"

          echo "Smoke OK for ${{ matrix.target_name }}"

      # aarch64-musl: verify the tarball is well-formed and contains an aarch64
      # ELF — without executing it (wrong arch for this runner).
      - name: Integrity check (non-runnable target)
        if: ${{ !matrix.runnable }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.fetch-artifacts.outputs.version }}"
          dir="mirror/v${version}"
          tb="${BIN_NAME}-${version}-${{ matrix.target_name }}.tar.gz"
          test -f "$dir/$tb" || { echo "::error::missing $dir/$tb" >&2; exit 1; }

          echo "::group::sha256 verify against SHA256SUMS"
          ( cd "$dir" && grep " ${tb}\$" SHA256SUMS | sha256sum -c - )
          echo "::endgroup::"

          echo "::group::unpack + legal files + arch"
          work="$(mktemp -d)"
          tar -xzf "$dir/$tb" -C "$work"
          stage="$work/${BIN_NAME}-${version}-${{ matrix.target_name }}"
          for f in "$BIN_NAME" NOTICE THIRD_PARTY_NOTICES LICENSE; do
            test -f "$stage/$f" || { echo "::error::tarball missing $f" >&2; exit 1; }
          done
          file "$stage/$BIN_NAME"
          file "$stage/$BIN_NAME" | grep -Eqi 'aarch64|arm aarch64|ARM64' || {
            echo "::error::binary is not aarch64" >&2; exit 1; }
          echo "::endgroup::"
          echo "Integrity OK for ${{ matrix.target_name }} (not executed: cross-arch)"
