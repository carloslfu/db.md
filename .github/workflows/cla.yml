# SPDX-License-Identifier: Apache-2.0
#
# CLA Assistant Lite — runs on every PR. Asks first-time contributors
# to sign the Apache ICLA by replying with the agreement text it
# prompts.

name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@9340315624c6e16cef1f2c63bdeb0f0c49c6f474
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          path-to-signatures: 'signatures/v1/cla.json'
          path-to-document: 'https://github.com/carloslfu/db.md/blob/main/CLA.md'
          branch: 'main'
          allowlist: dependabot[bot]
          remote-organization-name: carloslfu
          remote-repository-name: db.md-cla-signatures
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. Thanks!'
